<!DOCTYPE html>
<html>

<head>
    <title>House Price Prediction</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background-color: #f2f2f2;
        }

        form {
            margin-top: 50px;
        }

        input {
            padding: 10px;
            margin: 10px;
            width: 200px;
        }

        input[type="submit"] {
            background-color: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        h2 {
            color: #333;
        }
    </style>
</head>

<body>

    <h2>House Price Prediction using ANN</h2>

    <form action="/predict" method="post">

        <input type="text" name="Area" placeholder="Enter Area" required><br>

        <input type="text" name="Bedrooms" placeholder="Enter Bedrooms" required><br>

        <input type="text" name="Age" placeholder="Enter Age" required><br>

        <input type="submit" value="Predict">
    </form>

    <h3>{{ prediction_text }}</h3>

</body>

</html>
